     <h1>RENUEVA-TB</h1>
     <h2>Resiliencia y Esperanza para una Nueva Vida</h2>
    <h2 class="subtitleblack"Basándose en el modelo de RENUEVA para la esclerosis múltiple y adaptándolo a las  realidades científicas y comunitarias de la Tuberculosis (TB) en comunidades como Villa María del Triunfo, proponemos RENUEVA-TB. Las referencias a los artículos científicos en los que se basa este recurso se encuentran al final del documento.
El grupo de promotoras de salud lo puede utilizar en sus campañas de educación y  acompañamiento, enfocándose en la educación sobre síntomas y contagio, reducción del estigma, promover la adherencia y brindar esperanza. 
<span class="white">Haga clic en cada ícono</span> para descubrir
cinco formas pequeñas pero poderosas
de ayudarle a sentirse más fuerte, más
saludable y con mayor control.</h2>
